<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fit Diary 🌸</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fit Diary" />
  <meta name="theme-color" content="#F2A7B8" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose:       #F2A7B8;
      --rose-light: #FDE8EE;
      --rose-mid:   #F7C5D0;
      --blush:      #FDF0F3;
      --lilac:      #E8D5F5;
      --lilac-mid:  #C9A8E0;
      --sage:       #D4EAD0;
      --sage-mid:   #A8CFA3;
      --ink:        #3D2C35;
      --ink-soft:   #7A6570;
      --white:      #FFFFFF;
      --card:       #FFFBFC;
      --border:     #F0DDE4;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 2px 16px rgba(200,120,140,0.10);
      --shadow-sm:  0 1px 6px rgba(200,120,140,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blush);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HEADER */
    .app-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .app-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .app-header .emoji { font-size: 1.3rem; }

    /* TABS */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(200,120,140,0.08);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 4px 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-soft);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .tab-btn .tab-icon { font-size: 1.2rem; }
    .tab-btn.active { color: var(--rose); }
    .tab-btn.active .tab-icon { filter: none; }

    /* VIEWS */
    .view { display: none; padding: 20px 16px; }
    .view.active { display: block; }

    /* SECTION TITLE */
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 14px;
    }

    /* CALENDAR */
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .calendar-nav button {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 34px; height: 34px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--ink-soft);
      display: flex; align-items: center; justify-content: center;
    }
    .calendar-nav .month-label {
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      color: var(--ink);
      text-transform: capitalize;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-weekday {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--ink-soft);
      padding: 4px 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
      color: var(--ink);
    }
    .cal-day:hover { background: var(--rose-light); }
    .cal-day.empty { cursor: default; }
    .cal-day.today { font-weight: 700; color: var(--rose); }
    .cal-day.workout {
      background: var(--rose);
      color: var(--white);
    }
    .cal-day.workout:hover { background: #e8899c; }
    .cal-day.rest {
      background: var(--sage);
      color: var(--ink-soft);
    }
    .cal-day.selected {
      outline: 2px solid var(--rose);
      outline-offset: 1px;
    }
    .cat-dot {
      position: absolute;
      bottom: 3px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--white);
    }

    /* DAY DETAIL PANEL */
    .day-panel {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
    }
    .day-panel h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      margin-bottom: 14px;
      color: var(--ink);
      text-transform: capitalize;
    }
    .day-type-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .day-type-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink-soft);
      transition: all 0.15s;
    }
    .day-type-btn.active-workout {
      background: var(--rose);
      border-color: var(--rose);
      color: var(--white);
    }
    .day-type-btn.active-rest {
      background: var(--sage);
      border-color: var(--sage-mid);
      color: var(--ink);
    }

    /* CATEGORY SELECT */
    .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      display: block;
    }
    select, input[type="text"], input[type="number"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }
    select:focus, input:focus, textarea:focus {
      border-color: var(--rose);
    }

    /* EXERCISE LIST IN DAY */
    .exercise-planner { margin-top: 16px; }
    .exercise-planner h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .exercise-row {
      background: var(--blush);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .exercise-row-name {
      font-weight: 500;
      font-size: 0.88rem;
      margin-bottom: 8px;
    }
    .exercise-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .mini-input-wrap { display: flex; flex-direction: column; gap: 3px; }
    .mini-label { font-size: 0.65rem; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }
    .mini-input {
      padding: 6px 8px !important;
      font-size: 0.82rem !important;
    }
    .btn-remove-ex {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--rose);
      font-size: 1.1rem;
      padding: 2px;
      line-height: 1;
    }
    .add-exercise-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .add-exercise-row select { flex: 1; }

    /* FINISH WORKOUT */
    .finish-section {
      margin-top: 18px;
      background: var(--rose-light);
      border-radius: var(--radius);
      padding: 16px;
    }
    .finish-section h4 {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .finish-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--rose);
      color: var(--white);
    }
    .btn-primary:hover { background: #e8899c; }
    .btn-secondary {
      background: var(--white);
      color: var(--rose);
      border: 1.5px solid var(--rose);
    }
    .btn-sm { padding: 7px 14px; font-size: 0.78rem; }
    .btn-full { width: 100%; }
    .btn-success {
      background: var(--sage-mid);
      color: var(--white);
    }

    /* COMPLETED BADGE */
    .completed-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--sage);
      color: var(--ink);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    /* EXERCISES TAB */
    .category-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .category-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .category-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .category-name {
      font-weight: 600;
      font-size: 0.92rem;
    }
    .category-count {
      font-size: 0.72rem;
      color: var(--ink-soft);
    }
    .category-toggle { color: var(--ink-soft); font-size: 0.8rem; transition: transform 0.2s; }
    .category-body { padding: 12px 16px; }
    .exercise-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .exercise-item:last-child { border-bottom: none; }
    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-soft);
      font-size: 0.85rem;
      padding: 2px 6px;
    }
    .btn-delete:hover { color: var(--rose); }

    /* ADD CATEGORY / EXERCISE FORMS */
    .add-form {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px;
      margin-bottom: 16px;
    }
    .add-form h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      margin-bottom: 14px;
    }
    .form-row { margin-bottom: 12px; }
    .emoji-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .emoji-opt {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--blush);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .emoji-opt.selected {
      border-color: var(--rose);
      background: var(--rose-light);
    }
    .color-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .color-opt {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }
    .color-opt.selected { border-color: var(--ink); transform: scale(1.15); }

    /* STATS TAB */
    .stats-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 16px;
      margin-bottom: 12px;
    }
    .stats-card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem;
      margin-bottom: 12px;
      color: var(--ink);
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-val { font-weight: 600; color: var(--rose); }
    .workout-log-item {
      background: var(--blush);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .workout-log-date {
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 4px;
      text-transform: capitalize;
    }
    .workout-log-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--ink-soft);
      font-size: 0.78rem;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-soft);
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state p { font-size: 0.88rem; }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    @media (min-width: 600px) {
      body { max-width: 480px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <span class="emoji">🌸</span>
  <h1>Fit Diary</h1>
</header>

<!-- VIEWS -->
<div id="view-calendar" class="view active">
  <div class="calendar-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="calendar-grid" id="calendar-grid"></div>
  <div id="day-panel" style="display:none"></div>
</div>

<div id="view-exercises" class="view">
  <p class="section-title">Categorías y ejercicios</p>
  <div class="add-form">
    <h3>Nueva categoría</h3>
    <div class="form-row">
      <label class="field-label">Nombre</label>
      <input type="text" id="cat-name-input" placeholder="Ej: Piernas" />
    </div>
    <div class="form-row">
      <label class="field-label">Icono</label>
      <div class="emoji-row" id="emoji-picker"></div>
    </div>
    <div class="form-row">
      <label class="field-label">Color</label>
      <div class="color-row" id="color-picker"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addCategory()">Añadir categoría</button>
  </div>

  <div class="add-form">
    <h3>Nuevo ejercicio</h3>
    <div class="form-row">
      <label class="field-label">Categoría</label>
      <select id="ex-cat-select"><option value="">Selecciona categoría</option></select>
    </div>
    <div class="form-row">
      <label class="field-label">Nombre del ejercicio</label>
      <input type="text" id="ex-name-input" placeholder="Ej: Sentadilla" />
    </div>
    <button class="btn btn-primary btn-sm" onclick="addExercise()">Añadir ejercicio</button>
  </div>

  <div id="categories-list"></div>
</div>

<div id="view-stats" class="view">
  <p class="section-title">Historial</p>
  <div id="stats-summary"></div>
  <div id="workout-log"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('calendar', this)">
    <span class="tab-icon">📅</span>
    Calendario
  </button>
  <button class="tab-btn" onclick="switchTab('exercises', this)">
    <span class="tab-icon">💪</span>
    Ejercicios
  </button>
  <button class="tab-btn" onclick="switchTab('stats', this)">
    <span class="tab-icon">📊</span>
    Historial
  </button>
</nav>

<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxtl_lc9b6zS-6ld-LMGcBAyk6XjQ7vck",
    authDomain: "nail-projects.firebaseapp.com",
    databaseURL: "https://nail-projects-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nail-projects",
    storageBucket: "nail-projects.firebasestorage.app",
    messagingSenderId: "923664169473",
    appId: "1:923664169473:web:16f3c712ddd4d3400d9e00"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ─── STATE ───────────────────────────────────────────────
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth();
  let selectedDay = null;
  let categories = {};   // id -> {name, icon, color}
  let exercises = {};    // id -> {name, categoryId}
  let workouts = {};     // "YYYY-MM-DD" -> {type:'workout'|'rest', categoryId, exercises:[{exerciseId,sets,reps,weight}], duration, totalWeight, completed}

  const EMOJIS = ['🦵','💪','🏋️','🤸','🧘','🏃','🚴','🥊','🎯','⚡','🔥','🌟','❤️','🌸','🫀'];
  const COLORS = ['#F2A7B8','#C9A8E0','#A8CFA3','#A8C8EA','#F7C5A0','#E8D5A0','#C5E0D5','#D0B8F2'];

  let selectedEmoji = EMOJIS[0];
  let selectedColor = COLORS[0];

  // ─── FIREBASE LISTENERS ──────────────────────────────────
  onValue(ref(db, 'fitdiary/categories'), snap => {
    categories = snap.val() || {};
    renderCategoriesList();
    renderExCatSelect();
  });
  onValue(ref(db, 'fitdiary/exercises'), snap => {
    exercises = snap.val() || {};
    renderCategoriesList();
  });
  onValue(ref(db, 'fitdiary/workouts'), snap => {
    workouts = snap.val() || {};
    renderCalendar();
    if (selectedDay) renderDayPanel(selectedDay);
    renderStats();
  });

  // ─── TABS ────────────────────────────────────────────────
  window.switchTab = function(name, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'stats') renderStats();
  };

  // ─── CALENDAR ────────────────────────────────────────────
  function renderCalendar() {
    const label = document.getElementById('month-label');
    const grid = document.getElementById('calendar-grid');
    const d = new Date(currentYear, currentMonth, 1);
    label.textContent = d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });

    const weekdays = ['L','M','X','J','V','S','D'];
    let html = weekdays.map(w => `<div class="cal-weekday">${w}</div>`).join('');

    // First weekday (Monday=0)
    let startDay = (d.getDay() + 6) % 7;
    for (let i = 0; i < startDay; i++) html += `<div class="cal-day empty"></div>`;

    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date();

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = dateKey(currentYear, currentMonth, day);
      const w = workouts[dateStr];
      const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day;
      const isSelected = selectedDay === dateStr;

      let cls = 'cal-day';
      if (isToday) cls += ' today';
      if (isSelected) cls += ' selected';
      if (w?.type === 'workout') cls += ' workout';
      if (w?.type === 'rest') cls += ' rest';

      const dot = w?.type === 'workout' ? '<span class="cat-dot"></span>' : '';
      html += `<div class="${cls}" onclick="selectDay('${dateStr}')">${day}${dot}</div>`;
    }

    grid.innerHTML = html;
  }

  window.changeMonth = function(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  };

  window.selectDay = function(dateStr) {
    selectedDay = dateStr;
    renderCalendar();
    renderDayPanel(dateStr);
  };

  function renderDayPanel(dateStr) {
    const panel = document.getElementById('day-panel');
    panel.style.display = 'block';
    const w = workouts[dateStr] || {};
    const [y, m, d] = dateStr.split('-');
    const dateObj = new Date(+y, +m - 1, +d);
    const dateLabel = dateObj.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

    const catOptions = Object.entries(categories).map(([id, c]) =>
      `<option value="${id}" ${w.categoryId === id ? 'selected' : ''}>${c.icon} ${c.name}</option>`
    ).join('');

    const isWorkout = w.type === 'workout';
    const isRest = w.type === 'rest';

    // Exercise list for planned workout
    const planExercises = w.exercises || [];
    let exRows = planExercises.map((pe, idx) => {
      const ex = exercises[pe.exerciseId];
      if (!ex) return '';
      return `
        <div class="exercise-row" id="ex-row-${idx}">
          <div>
            <div class="exercise-row-name">${ex.name}</div>
            <div class="exercise-inputs">
              <div class="mini-input-wrap">
                <span class="mini-label">Series</span>
                <input type="number" class="mini-input" min="0" value="${pe.sets||''}" placeholder="0"
                  oninput="updateExField(${idx},'sets',this.value)" />
              </div>
              <div class="mini-input-wrap">
                <span class="mini-label">Reps</span>
                <input type="number" class="mini-input" min="0" value="${pe.reps||''}" placeholder="0"
                  oninput="updateExField(${idx},'reps',this.value)" />
              </div>
              <div class="mini-input-wrap">
                <span class="mini-label">Peso (kg)</span>
                <input type="number" class="mini-input" min="0" step="0.5" value="${pe.weight||''}" placeholder="—"
                  oninput="updateExField(${idx},'weight',this.value)" />
              </div>
            </div>
          </div>
          <button class="btn-remove-ex" onclick="removeExFromDay(${idx})">✕</button>
        </div>`;
    }).join('');

    const exSelectOpts = Object.entries(exercises).map(([id, e]) => {
      const cat = categories[e.categoryId];
      const label = cat ? `${cat.icon} ${e.name}` : e.name;
      return `<option value="${id}">${label}</option>`;
    }).join('');

    const completedBlock = w.completed ? `
      <div class="completed-badge">✅ Entrenamiento completado</div>
      <div class="stat-row"><span>Duración</span><span class="stat-val">${w.duration || '—'} min</span></div>
      <div class="stat-row"><span>Peso total levantado</span><span class="stat-val">${w.totalWeight || '—'} kg</span></div>
    ` : '';

    const finishBlock = isWorkout && !w.completed ? `
      <div class="finish-section">
        <h4>🏁 Finalizar entrenamiento</h4>
        <div class="finish-row">
          <div>
            <label class="field-label">Duración (min)</label>
            <input type="number" id="finish-duration" min="0" placeholder="45" />
          </div>
          <div>
            <label class="field-label">Peso total (kg)</label>
            <input type="number" id="finish-weight" min="0" step="0.5" placeholder="0" />
          </div>
        </div>
        <button class="btn btn-success btn-sm btn-full" onclick="finishWorkout('${dateStr}')">Marcar como completado ✓</button>
      </div>
    ` : '';

    panel.innerHTML = `
      <div class="day-panel">
        <h3>${dateLabel}</h3>

        <div class="day-type-row">
          <button class="day-type-btn ${isWorkout ? 'active-workout' : ''}" onclick="setDayType('${dateStr}','workout')">💪 Entrenamiento</button>
          <button class="day-type-btn ${isRest ? 'active-rest' : ''}" onclick="setDayType('${dateStr}','rest')">😴 Descanso</button>
          <button class="day-type-btn" onclick="clearDay('${dateStr}')">✕ Quitar</button>
        </div>

        ${isWorkout ? `
          <div class="form-row">
            <label class="field-label">Categoría del día</label>
            <select onchange="setDayCat('${dateStr}',this.value)">
              <option value="">Sin categoría</option>
              ${catOptions}
            </select>
          </div>

          ${completedBlock}

          <div class="exercise-planner">
            <h4>Ejercicios planificados</h4>
            ${exRows || '<p style="font-size:0.82rem;color:var(--ink-soft);margin-bottom:8px">No hay ejercicios aún</p>'}
            <div class="add-exercise-row">
              <select id="add-ex-select">
                <option value="">Añadir ejercicio…</option>
                ${exSelectOpts}
              </select>
              <button class="btn btn-secondary btn-sm" onclick="addExToDay('${dateStr}')">+</button>
            </div>
          </div>

          ${finishBlock}
        ` : ''}
      </div>
    `;
  }

  window.setDayType = function(dateStr, type) {
    const existing = workouts[dateStr] || {};
    const updated = { ...existing, type };
    set(ref(db, `fitdiary/workouts/${dateStr}`), updated);
  };

  window.setDayCat = function(dateStr, catId) {
    const existing = workouts[dateStr] || {};
    set(ref(db, `fitdiary/workouts/${dateStr}`), { ...existing, categoryId: catId });
  };

  window.clearDay = function(dateStr) {
    remove(ref(db, `fitdiary/workouts/${dateStr}`));
    document.getElementById('day-panel').style.display = 'none';
    selectedDay = null;
    renderCalendar();
  };

  window.addExToDay = function(dateStr) {
    const sel = document.getElementById('add-ex-select');
    const exId = sel.value;
    if (!exId) return;
    const existing = workouts[dateStr] || {};
    const exList = existing.exercises ? [...existing.exercises] : [];
    exList.push({ exerciseId: exId, sets: '', reps: '', weight: '' });
    set(ref(db, `fitdiary/workouts/${dateStr}`), { ...existing, exercises: exList });
  };

  window.removeExFromDay = function(idx) {
    if (!selectedDay) return;
    const existing = workouts[selectedDay] || {};
    const exList = [...(existing.exercises || [])];
    exList.splice(idx, 1);
    set(ref(db, `fitdiary/workouts/${selectedDay}`), { ...existing, exercises: exList });
  };

  window.updateExField = function(idx, field, val) {
    if (!selectedDay) return;
    const existing = workouts[selectedDay] || {};
    const exList = [...(existing.exercises || [])];
    if (!exList[idx]) return;
    exList[idx] = { ...exList[idx], [field]: val };
    set(ref(db, `fitdiary/workouts/${selectedDay}`), { ...existing, exercises: exList });
  };

  window.finishWorkout = function(dateStr) {
    const duration = document.getElementById('finish-duration')?.value || '';
    const totalWeight = document.getElementById('finish-weight')?.value || '';
    const existing = workouts[dateStr] || {};
    set(ref(db, `fitdiary/workouts/${dateStr}`), { ...existing, completed: true, duration, totalWeight });
    showToast('¡Entrenamiento completado! 🎉');
  };

  // ─── CATEGORIES ──────────────────────────────────────────
  function initPickers() {
    const ep = document.getElementById('emoji-picker');
    ep.innerHTML = EMOJIS.map(e =>
      `<div class="emoji-opt ${e === selectedEmoji ? 'selected' : ''}" onclick="pickEmoji('${e}')">${e}</div>`
    ).join('');

    const cp = document.getElementById('color-picker');
    cp.innerHTML = COLORS.map(c =>
      `<div class="color-opt ${c === selectedColor ? 'selected' : ''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
    ).join('');
  }
  initPickers();

  window.pickEmoji = function(e) {
    selectedEmoji = e;
    initPickers();
  };
  window.pickColor = function(c) {
    selectedColor = c;
    initPickers();
  };

  window.addCategory = function() {
    const name = document.getElementById('cat-name-input').value.trim();
    if (!name) return showToast('Pon un nombre a la categoría');
    const id = 'cat_' + Date.now();
    set(ref(db, `fitdiary/categories/${id}`), { name, icon: selectedEmoji, color: selectedColor });
    document.getElementById('cat-name-input').value = '';
    showToast('Categoría añadida ✓');
  };

  function renderExCatSelect() {
    const sel = document.getElementById('ex-cat-select');
    sel.innerHTML = '<option value="">Selecciona categoría</option>' +
      Object.entries(categories).map(([id, c]) =>
        `<option value="${id}">${c.icon} ${c.name}</option>`
      ).join('');
  }

  window.addExercise = function() {
    const catId = document.getElementById('ex-cat-select').value;
    const name = document.getElementById('ex-name-input').value.trim();
    if (!catId) return showToast('Selecciona una categoría');
    if (!name) return showToast('Pon un nombre al ejercicio');
    const id = 'ex_' + Date.now();
    set(ref(db, `fitdiary/exercises/${id}`), { name, categoryId: catId });
    document.getElementById('ex-name-input').value = '';
    showToast('Ejercicio añadido ✓');
  };

  function renderCategoriesList() {
    const container = document.getElementById('categories-list');
    const catEntries = Object.entries(categories);
    if (!catEntries.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏋️</div><p>Crea tu primera categoría arriba</p></div>`;
      return;
    }

    container.innerHTML = catEntries.map(([catId, cat]) => {
      const catExercises = Object.entries(exercises).filter(([, e]) => e.categoryId === catId);
      const exHtml = catExercises.length
        ? catExercises.map(([exId, ex]) =>
            `<div class="exercise-item">
              <span>${ex.name}</span>
              <button class="btn-delete" onclick="deleteExercise('${exId}')">✕</button>
            </div>`
          ).join('')
        : '<p style="font-size:0.82rem;color:var(--ink-soft);padding:8px 0">Sin ejercicios aún</p>';

      return `
        <div class="category-card">
          <div class="category-header" onclick="toggleCat('${catId}')">
            <div class="category-header-left">
              <div class="category-icon" style="background:${cat.color}20">${cat.icon}</div>
              <div>
                <div class="category-name">${cat.name}</div>
                <div class="category-count">${catExercises.length} ejercicio${catExercises.length !== 1 ? 's' : ''}</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="btn-delete" onclick="event.stopPropagation();deleteCategory('${catId}')">🗑️</button>
              <span class="category-toggle" id="toggle-${catId}">▼</span>
            </div>
          </div>
          <div class="category-body" id="cat-body-${catId}" style="display:none">
            ${exHtml}
          </div>
        </div>`;
    }).join('');
  }

  window.toggleCat = function(id) {
    const body = document.getElementById('cat-body-' + id);
    const arrow = document.getElementById('toggle-' + id);
    const open = body.style.display !== 'none';
    body.style.display = open ? 'none' : 'block';
    arrow.textContent = open ? '▼' : '▲';
  };

  window.deleteCategory = function(id) {
    // Also remove exercises in this category
    Object.entries(exercises).forEach(([exId, ex]) => {
      if (ex.categoryId === id) remove(ref(db, `fitdiary/exercises/${exId}`));
    });
    remove(ref(db, `fitdiary/categories/${id}`));
    showToast('Categoría eliminada');
  };

  window.deleteExercise = function(id) {
    remove(ref(db, `fitdiary/exercises/${id}`));
    showToast('Ejercicio eliminado');
  };

  // ─── STATS ───────────────────────────────────────────────
  function renderStats() {
    const all = Object.entries(workouts);
    const completed = all.filter(([, w]) => w.completed);
    const totalWorkouts = all.filter(([, w]) => w.type === 'workout').length;
    const totalCompleted = completed.length;
    const totalDuration = completed.reduce((acc, [, w]) => acc + (+w.duration || 0), 0);
    const totalWeight = completed.reduce((acc, [, w]) => acc + (+w.totalWeight || 0), 0);

    document.getElementById('stats-summary').innerHTML = `
      <div class="stats-card">
        <h3>Resumen general</h3>
        <div class="stat-row"><span>Días de entrenamiento</span><span class="stat-val">${totalWorkouts}</span></div>
        <div class="stat-row"><span>Entrenamientos completados</span><span class="stat-val">${totalCompleted}</span></div>
        <div class="stat-row"><span>Tiempo total</span><span class="stat-val">${totalDuration} min</span></div>
        <div class="stat-row"><span>Peso total levantado</span><span class="stat-val">${totalWeight} kg</span></div>
      </div>
    `;

    if (!completed.length) {
      document.getElementById('workout-log').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>Aún no tienes entrenamientos completados</p>
        </div>`;
      return;
    }

    const sorted = completed.sort((a, b) => b[0].localeCompare(a[0]));
    document.getElementById('workout-log').innerHTML = `
      <p class="section-title" style="margin-top:8px">Últimos entrenamientos</p>
      ${sorted.map(([dateStr, w]) => {
        const [y, m, d] = dateStr.split('-');
        const dateObj = new Date(+y, +m - 1, +d);
        const dateLabel = dateObj.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
        const cat = w.categoryId ? categories[w.categoryId] : null;
        const exCount = (w.exercises || []).length;
        return `
          <div class="workout-log-item">
            <div class="workout-log-date">${cat ? cat.icon + ' ' : ''}${dateLabel}</div>
            <div class="workout-log-meta">
              ${cat ? `<span>${cat.name}</span>` : ''}
              ${w.duration ? `<span>⏱ ${w.duration} min</span>` : ''}
              ${w.totalWeight ? `<span>🏋️ ${w.totalWeight} kg</span>` : ''}
              ${exCount ? `<span>📝 ${exCount} ejercicio${exCount !== 1 ? 's' : ''}</span>` : ''}
            </div>
          </div>`;
      }).join('')}
    `;
  }

  // ─── UTILS ───────────────────────────────────────────────
  function dateKey(y, m, d) {
    return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Expose for inline handlers
  window.renderCalendar = renderCalendar;
  renderCalendar();
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(() => console.log('Service Worker registrado ✓'))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
